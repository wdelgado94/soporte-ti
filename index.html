<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Registro Soporte TI</title>
<style>
body { font-family: Arial; max-width: 600px; margin: auto; }
input, textarea, select { width: 100%; padding: 8px; margin: 5px 0; }
canvas { border: 1px solid #000; }
button { padding: 10px; margin-top: 10px; width: 100%; }
</style>
</head>
<body>

<h2>Registro de Servicio TI</h2>

<form id="form">

<input type="text" id="nombre" placeholder="Nombre Cliente" required>
<input type="text" id="empresa" placeholder="Empresa" required>
<input type="text" id="documento" placeholder="Documento" required>

<select id="tipo" required>
<option value="">Tipo de Servicio</option>
<option>Soporte Remoto</option>
<option>Mantenimiento</option>
<option>Instalacion</option>
<option>Redes</option>
<option>Otro</option>
</select>

<textarea id="descripcion" placeholder="Descripcion del servicio" required></textarea>

<select id="satisfaccion" required>
<option value="">Nivel de Satisfaccion</option>
<option>1 - Malo</option>
<option>2 - Regular</option>
<option>3 - Bueno</option>
<option>4 - Muy Bueno</option>
<option>5 - Excelente</option>
</select>

<p><b>Firma del Cliente:</b></p>
<canvas id="signature" width="500" height="200"></canvas>
<button type="button" onclick="clearCanvas()">Limpiar Firma</button>

<button type="submit">Enviar Registro</button>

</form>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<script>
const canvas = document.getElementById('signature');
const signaturePad = new SignaturePad(canvas);

function clearCanvas() {
  signaturePad.clear();
}

document.getElementById('form').addEventListener('submit', function(e) {
  e.preventDefault();

  if (signaturePad.isEmpty()) {
    alert("Debe firmar antes de enviar.");
    return;
  }

  const data = {
    nombre: document.getElementById('nombre').value,
    empresa: document.getElementById('empresa').value,
    documento: document.getElementById('documento').value,
    tipo: document.getElementById('tipo').value,
    descripcion: document.getElementById('descripcion').value,
    satisfaccion: document.getElementById('satisfaccion').value,
    firma: signaturePad.toDataURL()
  };

  fetch("https://script.google.com/macros/s/AKfycbwDNZnHC1vPKxyCDRBAckPi_B2dDnCRytKw6zzWg3SMDC5xirc-S0AROEuvJK1pSScm/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(response => {
    alert("Registro enviado correctamente");
    document.getElementById('form').reset();
    signaturePad.clear();
  })
  .catch(error => alert("Error al enviar"));
});
</script>

</body>
</html>
